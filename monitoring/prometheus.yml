# Prometheus监控配置
# Prometheus monitoring configuration
# 用于监控Aegis-Cortex V6.2系统
# For monitoring Aegis-Cortex V6.2 system

global:
  scrape_interval: 15s  # 抓取间隔
  evaluation_interval: 15s  # 评估间隔
  scrape_timeout: 10s  # 抓取超时

# 告警规则文件
# Alert rules file
rule_files:
  # - "alerts.yml"

# 告警管理器配置
# Alert manager configuration
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           # - alertmanager:9093

# 抓取配置
# Scrape configurations
scrape_configs:
  # Prometheus自身监控
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Aegis-Cortex V6.2应用监控
  # Aegis-Cortex V6.2 application monitoring
  - job_name: 'aegis-cortex'
    static_configs:
      - targets: ['aegis-cortex:9091']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.*):.*'
        replacement: '${1}'

  # Node Exporter监控（系统资源）
  # Node Exporter monitoring (system resources)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Qdrant数据库监控
  # Qdrant database monitoring
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'
    scrape_interval: 30s
    params:
      format: ['prometheus']

# 远程写入配置（可选）
# Remote write configuration (optional)
# remote_write:
#   - url: "http://remote-prometheus:9090/api/v1/write"
#     queue_config:
#       max_samples_per_send: 1000
#       capacity: 5000

# 远程读取配置（可选）
