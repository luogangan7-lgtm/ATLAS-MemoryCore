# Aegis-Cortex V6.2 配置文件
# Aegis-Cortex V6.2 Configuration File
# 版本: 6.2.0
# Version: 6.2.0

version: "6.2.0"
architecture: "Aegis-Cortex V6.2"

# TurboQuant压缩配置
# TurboQuant compression configuration
turboquant:
  enabled: true
  compression_ratio: 0.25  # 目标压缩率25%
  quantization_bits: 4     # 4位量化
  group_size: 128         # 分组大小
  prune_threshold: 0.01   # 剪枝阈值
  
  # 性能参数
  use_gpu: false          # 是否使用GPU加速
  batch_size: 32          # 批处理大小
  cache_enabled: true     # 启用缓存
  
  # 质量参数
  preserve_attention_patterns: true    # 保持注意力模式
  maintain_relative_magnitudes: true   # 保持相对幅度

# 四级过滤配置
# Four-stage filter configuration
four_stage_filter:
  enabled: true
  
  # 阶段1: 元数据预过滤
  metadata_filters: {}      # 元数据过滤器
  require_all_metadata: false
  
  # 阶段2: 向量相似度过滤
  similarity_threshold: 0.82  # 相似度阈值
  max_candidates_per_stage: 1000
  
  # 阶段3: 重要性分数过滤
  importance_threshold: 0.5   # 重要性阈值
  
  # 阶段4: 时间衰减调整
  use_ebbinghaus_decay: true  # 使用艾宾浩斯衰减
  half_life_days: 1.0         # 半衰期1天
  recency_weight: 0.25        # 近期性权重
  
  # 分层记忆参数
  working_memory_limit: 10    # 工作记忆限制
  short_term_days: 1          # 短期记忆天数
  medium_term_days: 7         # 中期记忆天数
  long_term_all: true         # 长期记忆保留全部
  
  # 性能参数
  enable_caching: true        # 启用缓存
  cache_ttl_seconds: 300      # 缓存TTL

# Token经济配置
# Token economy configuration
token_economy:
  enabled: true
  
  # 监控参数
  enable_token_monitoring: true
  token_cost_warning_threshold: 50.0  # 人民币警告阈值
  daily_token_budget: null            # 每日Token预算（null表示无限制）
  
  # 压缩参数
  max_tokens_per_query: 1000          # 每查询最大Token数
  target_compression_ratio: 0.25      # 目标压缩率
  
  # 自动降级参数
  auto_downgrade_enabled: true
  downgrade_thresholds:
    critical: 0.9   # 90%预算使用后降级
    high: 0.75      # 75%预算使用后降级
    medium: 0.5     # 50%预算使用后降级
  
  # 报告参数
  daily_report_enabled: true
  weekly_report_enabled: true
  alert_channels: ["log"]  # 告警通道

# 夜间净化配置
# Nocturnal optimization configuration
nocturnal_optimization:
  enabled: true
  optimization_time: "03:00"  # 凌晨3点执行
  optimization_batch_size: 1000
  
  # 遗忘参数
  forget_threshold: 0.3       # 遗忘阈值（重要性<0.3的记忆会被遗忘）
  forget_batch_size: 100
  
  # 升级参数
  upgrade_threshold: 0.85     # 升级阈值（重要性>0.85的记忆升级到长期存储）
  upgrade_batch_size: 50
  
  # 压缩参数
  compression_enabled: true
  compression_batch_size: 200
  
  # 监控参数
  enable_progress_tracking: true
  send_completion_notification: true

# 知识图谱配置（高级功能）
# Knowledge graph configuration (advanced feature)
knowledge_graph:
  enabled: false  # 默认关闭，需要时启用
  
  # 实体识别
  entity_recognition_enabled: true
  entity_types:
    - "PERSON"
    - "ORGANIZATION"
    - "LOCATION"
    - "DATE"
    - "MONEY"
    - "PRODUCT"
    - "EVENT"
    - "SKILL"
  
  # 关系提取
  relation_extraction_enabled: true
  relation_types:
    - "works_for"
    - "located_in"
    - "created_at"
    - "related_to"
    - "part_of"
    - "similar_to"
  
  # 图谱存储
  graph_database: "neo4j"  # 或 "networkx"
  graph_host: "localhost"
  graph_port: 7687
  
  # 性能参数
  batch_size: 100
  cache_enabled: true

# 系统参数
# System parameters
system:
  debug_mode: false      # 调试模式
  log_level: "INFO"      # 日志级别: DEBUG, INFO, WARNING, ERROR
  enable_metrics: true   # 启用监控指标
  metrics_port: 9091     # 监控指标端口