# Aegis-Cortex V6.2 生产环境配置
# 版本: 6.2.0
# 部署时间: 2026-04-21

# 系统配置
system:
  name: "ATLAS-MemoryCore Aegis-Cortex V6.2"
  version: "6.2.0"
  environment: "production"
  debug: false
  log_level: "INFO"
  
  # 性能配置
  max_concurrent_queries: 100
  query_timeout_seconds: 30
  cache_enabled: true
  cache_ttl_seconds: 3600

# 数据库配置
database:
  # Qdrant向量数据库
  qdrant:
    host: "localhost"
    port: 6333
    grpc_port: 6334
    collection_name: "atlas_memories_v6_2"
    vector_size: 768
    distance: "Cosine"
    
    # 性能优化
    hnsw_config:
      m: 16
      ef_construct: 200
      ef_search: 100
    
    # 持久化
    storage_path: "/data/qdrant/storage"
    snapshot_interval_hours: 24
    
  # 元数据存储 (SQLite/PostgreSQL)
  metadata:
    type: "sqlite"  # 可选: sqlite, postgresql
    path: "/data/metadata/memories.db"
    # PostgreSQL配置 (如果使用)
    # host: "localhost"
    # port: 5432
    # database: "atlas_memory"
    # username: "atlas"
    # password: ""

# 嵌入模型配置
embedding:
  primary_model: "nomic-ai/nomic-embed-text-v1.5"
  fallback_model: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 32
  cache_embeddings: true
  cache_dir: "/data/embeddings/cache"
  
  # Nomic API配置 (可选)
  nomic:
    api_key: ""  # 从环境变量 NOMIC_API_KEY 读取
    project_name: "atlas-memorycore"

# Aegis-Cortex V6.2 核心组件配置
aegis_cortex:
  # TurboQuant压缩配置
  turboquant:
    enabled: true
    compression_level: "aggressive"  # aggressive, balanced, conservative
    group_size: 128
    quantization_bits: 4
    cache_compressed: true
    max_cache_size_mb: 1024
    
  # 四级过滤配置
  four_stage_filter:
    enabled: true
    stages:
      metadata_filter:
        enabled: true
        required_fields: ["category", "importance"]
        min_importance: 0.3
        
      similarity_filter:
        enabled: true
        min_similarity: 0.5
        max_results_per_stage: 50
        
      importance_filter:
        enabled: true
        min_importance: 0.4
        importance_weight: 0.6
        
      time_decay_filter:
        enabled: true
        decay_function: "ebbinghaus"  # ebbinghaus, exponential, linear
        half_life_days: 30
        recent_bias: 0.3
    
  # Token经济配置
  token_economy:
    enabled: true
    cost_tracking: true
    auto_downgrade: true
    
    # 成本阈值 (美元)
    daily_budget: 10.0
    warning_threshold: 0.8  # 80% of budget
    critical_threshold: 0.95  # 95% of budget
    
    # 模型成本配置 (美元/1000 tokens)
    model_costs:
      "gpt-4": 0.03
      "gpt-3.5-turbo": 0.0015
      "claude-3": 0.025
      "nomic": 0.0001
      "turboquant": 0.00001
      
    # 降级策略
    downgrade_strategy:
      "gpt-4": "gpt-3.5-turbo"
      "claude-3": "gpt-3.5-turbo"
      
  # 夜间优化配置
  nocturnal_optimization:
    enabled: true
    schedule: "0 2 * * *"  # 每天凌晨2点
    timezone: "Asia/Shanghai"
    
    tasks:
      - name: "memory_compaction"
        enabled: true
        max_age_days: 90
        
      - name: "vector_reindexing"
        enabled: true
        interval_days: 7
        
      - name: "cache_cleanup"
        enabled: true
        max_age_days: 30
        
      - name: "performance_analysis"
        enabled: true
        generate_report: true

# API服务器配置
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  max_request_size_mb: 10
  
  # 认证配置
  authentication:
    enabled: false  # 生产环境建议启用
    jwt_secret: ""  # 从环境变量 JWT_SECRET 读取
    token_expiry_hours: 24
    
  # 速率限制
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_limit: 10
    
  # CORS配置
  cors:
    enabled: true
    allow_origins: ["*"]  # 生产环境应限制
    allow_methods: ["GET", "POST", "PUT", "DELETE"]
    allow_headers: ["*"]

# 监控配置
monitoring:
  # Prometheus指标
  prometheus:
    enabled: true
    port: 9090
    scrape_interval: "15s"
    
    metrics:
      - name: "query_latency"
        help: "查询处理延迟"
        type: "histogram"
        
      - name: "token_usage"
        help: "Token使用量"
        type: "counter"
        
      - name: "cache_hit_rate"
        help: "缓存命中率"
        type: "gauge"
        
      - name: "memory_usage"
        help: "内存使用量"
        type: "gauge"
  
  # 健康检查
  health_checks:
    enabled: true
    interval_seconds: 30
    endpoints:
      - name: "database"
        type: "qdrant"
        
      - name: "embedding_model"
        type: "http"
        url: "http://localhost:8000/health/embedding"
        
      - name: "api"
        type: "http"
        url: "http://localhost:8000/health"
  
  # 告警配置
  alerts:
    enabled: true
    
    rules:
      - name: "high_latency"
        condition: "query_latency > 5000"
        severity: "warning"
        message: "查询延迟超过5秒"
        
      - name: "high_token_usage"
        condition: "token_usage > 100000"
        severity: "critical"
        message: "Token使用量超过100k"
        
      - name: "low_cache_hit"
        condition: "cache_hit_rate < 0.5"
        severity: "warning"
        message: "缓存命中率低于50%"
        
      - name: "service_down"
        condition: "up == 0"
        severity: "critical"
        message: "服务不可用"
    
    # 通知渠道
    notifications:
      email:
        enabled: false
        smtp_server: ""
        from_address: ""
        to_addresses: []
        
      slack:
        enabled: false
        webhook_url: ""  # 从环境变量 SLACK_WEBHOOK_URL 读取
        
      webhook:
        enabled: false
        url: ""  # 从环境变量 ALERT_WEBHOOK_URL 读取

# 备份配置
backup:
  enabled: true
  schedule: "0 3 * * *"  # 每天凌晨3点
  
  # 备份目标
  targets:
    - type: "local"
      path: "/data/backups"
      retention_days: 30
      
    - type: "s3"
      enabled: false
      bucket: "atlas-memorycore-backups"
      region: "us-east-1"
      access_key: ""  # 从环境变量 AWS_ACCESS_KEY_ID 读取
      secret_key: ""  # 从环境变量 AWS_SECRET_ACCESS_KEY 读取
  
  # 备份内容
  include:
    - "/data/qdrant/storage"
    - "/data/metadata"
    - "/data/embeddings/cache"
    - "/var/log/atlas-memorycore"

# 日志配置
logging:
  console:
    enabled: true
    level: "INFO"
    
  file:
    enabled: true
    path: "/var/log/atlas-memorycore/app.log"
    level: "INFO"
    max_size_mb: 100
    backup_count: 10
    
  # 结构化日志
  structured: true
  json_format: true
  
  # 日志字段
  fields:
    service: "atlas-memorycore"
    version: "6.2.0"
    environment: "production"

# 环境变量覆盖
# 使用环境变量可以覆盖以下配置:
# - database.qdrant.host: QDRANT_HOST
# - database.qdrant.port: QDRANT_PORT
# - embedding.nomic.api_key: NOMIC_API_KEY
# - api.authentication.jwt_secret: JWT_SECRET
# - monitoring.alerts.notifications.slack.webhook_url: SLACK_WEBHOOK_URL
# - backup.targets[1].access_key: AWS_ACCESS_KEY_ID
# - backup.targets[1].secret_key: AWS_SECRET_ACCESS_KEY