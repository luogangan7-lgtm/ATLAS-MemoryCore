# ATLAS-MemoryCore V6.2 Docker Compose配置
# ATLAS-MemoryCore V6.2 Docker Compose Configuration
# 包含Qdrant向量数据库和Aegis-Cortex服务
# Includes Qdrant vector database and Aegis-Cortex service

version: '3.8'

services:
  # Qdrant向量数据库服务
  # Qdrant vector database service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: atlas-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API端口 / REST API port
      - "6334:6334"  # gRPC端口 / gRPC port
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - atlas-network

  # Aegis-Cortex V6.2主服务
  # Aegis-Cortex V6.2 main service
  aegis-cortex:
    build: .
    container_name: atlas-aegis-cortex
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"  # API端口 / API port
      - "9091:9091"  # 监控指标端口 / Metrics port
    volumes:
      - ./config:/app/config  # 配置文件 / Configuration files
      - ./data:/app/data      # 数据目录 / Data directory
      - ./logs:/app/logs      # 日志目录 / Log directory
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LOG_LEVEL=INFO
      - CONFIG_PATH=/app/config/aegis_config.yaml
    env_file:
      - .env  # 环境变量文件 / Environment variables file
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.path.append('/app/src'); from core.aegis_orchestrator import get_global_orchestrator; orchestrator = get_global_orchestrator(); status = orchestrator.get_system_status(); print('Aegis-Cortex健康检查通过')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - atlas-network
    command: >
      sh -c "python src/api/server.py"

  # 监控服务 (可选)
  # Monitoring service (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    restart: unless-stopped
    depends_on:
      - aegis-cortex
    ports:
      - "9090:9090"  # Prometheus端口 / Prometheus port
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - atlas-network

  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"  # Grafana端口 / Grafana port
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - atlas-network

# 数据卷定义
# Volume definitions
volumes:
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# 网络定义
# Network definition
networks:
  atlas-network:
    driver: bridge
    name: atlas-network