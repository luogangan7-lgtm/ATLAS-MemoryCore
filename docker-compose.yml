# ATLAS-MemoryCore V6.0 Docker Compose配置
# Phase 2: 生产环境部署

version: '3.8'

services:
  # ATLAS主服务
  atlas-memory-core:
    build: .
    container_name: atlas-memory-core
    restart: unless-stopped
    ports:
      - "8000:8000"  # HTTP API
      - "6333:6333"  # Qdrant向量数据库
    environment:
      - QDRANT_MODE=local
      - LOG_LEVEL=INFO
      - MODEL_CACHE_DIR=/app/data/models
      - TZ=Asia/Shanghai
    volumes:
      - atlas_data:/app/data
      - ./config:/app/config:ro
      - ./models:/app/data/models:ro  # 预训练模型
    command: serve
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.path.append('/app'); from src.core.qdrant_storage import QdrantStorage; storage = QdrantStorage(); exit(0) if storage.client else exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - atlas-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-atlas123}
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL数据库（可选，用于元数据存储）
  postgres:
    image: postgres:15-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=atlas
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-atlas123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 监控和日志收集
  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - atlas-network

  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - atlas-network
    depends_on:
      - prometheus

  # Nginx反向代理（生产环境）
  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - atlas-network
    depends_on:
      - atlas-memory-core

  # 定时任务服务
  cron:
    build: .
    container_name: atlas-cron
    restart: unless-stopped
    environment:
      - QDRANT_URL=atlas-memory-core:6333
      - LOG_LEVEL=INFO
    volumes:
      - atlas_data:/app/data
      - ./config:/app/config:ro
    command: optimize
    networks:
      - atlas-network
    deploy:
      resources:
        limits:
          memory: 2G

# 网络配置
networks:
  atlas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷配置
volumes:
  atlas_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local